<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartStock – Registrieren</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0a0c10;
            --surface: #12151c;
            --border:  #1e2330;
            --accent:  #00e5b0;
            --accent2: #0070f3;
            --text:    #e8eaf0;
            --muted:   #5a6175;
            --danger:  #ff4d6a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.4;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,112,243,0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 60px rgba(0,112,243,0.06), 0 24px 48px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--accent); }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .alert {
            background: rgba(255,77,106,0.1);
            border: 1px solid rgba(255,77,106,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(0,112,243,0.12);
        }

        input::placeholder { color: var(--muted); }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border: none;
            border-radius: 8px;
            color: #0a0c10;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover  { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span { color: var(--muted); font-size: 11px; letter-spacing: 1px; }

        .link-row {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .link-row a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .link-row a:hover { text-decoration: underline; }

        /* Passwort-Stärke */
        .strength-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">Smart<span>Stock</span></div>
    </div>

    <h1>Konto erstellen</h1>
    <p class="subtitle">Registriere dich, um Zugang zum System zu erhalten.</p>

    <div th:if="${error}" class="alert">
        ✗ <span th:text="${error}">Fehler bei der Registrierung.</span>
    </div>

    <form th:action="@{/auth/register}" method="post">
        <div class="field">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username"
                   th:value="${username}" placeholder="dein.name" required autofocus/>
        </div>
        <div class="field">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password"
                   placeholder="Mindestens 6 Zeichen" required
                   oninput="updateStrength(this.value)"/>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>
        <div class="field">
            <label for="passwordConfirm">Passwort bestätigen</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm"
                   placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn">Registrieren →</button>
    </form>

    <div class="divider"><span>ODER</span></div>

    <div class="link-row">
        Schon ein Konto?
        <a th:href="@{/auth/login}">Jetzt anmelden</a>
    </div>
</div>

<script>
    function updateStrength(val) {
        const fill = document.getElementById('strengthFill');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9!@#$%^&*]/.test(val)) score++;
        const colors = ['#ff4d6a','#ff9a3c','#f5c518','#00e5b0'];
        fill.style.width  = (score * 25) + '%';
        fill.style.background = colors[score - 1] || 'transparent';
    }
</script>
</body>
</html>
