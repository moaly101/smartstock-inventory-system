<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SmartStock Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 class="mb-4">SmartStock Inventar</h2>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">📦 SmartStock System</a>
        <form th:action="@{/auth/logout}" method="post" class="d-flex">
            <button class="btn btn-outline-light btn-sm" type="submit">logout</button>
        </form>
    </div>
</nav>
<table class="table table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Bestand</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}">1</td>
        <td th:text="${p.name}">Name</td>
        <td th:text="${p.stock}">0</td>
        <td>
            <span th:if="${p.needsRestock()}" class="badge bg-danger">NACHBESTELLEN</span>
            <span th:unless="${p.needsRestock()}" class="badge bg-success">OK</span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
