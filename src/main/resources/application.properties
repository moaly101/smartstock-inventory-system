spring.application.name=smartstock-system

# Globales Level
logging.level.root=INFO
# Spezifisch f³r Ihr System
logging.level.org.example.smartstocksystem=DEBUG
# Optional: In Datei schreiben
logging.file.name=logs/smartstock.log

spring.datasource.url=jdbc:postgresql://localhost:5432/smartstock
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.url=jdbc:postgresql://localhost:5432/smartstock
spring.flyway.user=user
spring.flyway.password=password
logging.level.org.flywaydb=info

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}