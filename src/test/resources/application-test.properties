# H2 In-Memory Konfiguration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Wir schalten das automatische Erstellen durch Hibernate aus, 
# damit Flyway die Kontrolle beh‰lt.
spring.jpa.hibernate.ddl-auto=none

# Flyway f¸r Tests aktivieren
spring.flyway.enabled=true
# Optional: Falls deine Migrations-Scripte h2-spezifisch sind
spring.flyway.locations=classpath:db/migration